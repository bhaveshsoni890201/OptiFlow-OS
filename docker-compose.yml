services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

  backend:
    image: frappe/bench:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/home/frappe/frappe-bench
    environment:
      - MYSQL_ROOT_PASSWORD=optiflow
